spring:
  application:
    name: learn-how-you-learn

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/learnapp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  devtools:
    restart:
      enabled: true

  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=100,expireAfterWrite=10m

openai:
  api-key: ${OPENAI_API_KEY:change-me}
  model: ${OPENAI_MODEL:gpt-4o-mini}
  enabled: ${OPENAI_ENABLED:true}
  timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:60}
  base-url: https://api.openai.com/v1

server:
  port: 8081

logging:
  level:
    com.learnhowyoulearn: DEBUG
    org.flywaydb: INFO
